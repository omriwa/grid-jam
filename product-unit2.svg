<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="#090c10"/>
  <!-- directional beam arc (horizontal sector) -->
  <path d="M200,148 L72,60 A155,155 0 0,1 328,60 Z" fill="rgba(200,168,75,0.05)" stroke="#c8a84b" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.5"/>
  <path d="M200,148 L100,80 A120,120 0 0,1 300,80 Z" fill="rgba(200,168,75,0.07)" stroke="#c8a84b" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.6"/>
  <path d="M200,148 L130,100 A90,90 0 0,1 270,100 Z" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="1" opacity="0.7"/>
  <!-- back coverage smaller -->
  <path d="M200,148 L170,210 A40,40 0 0,0 230,210 Z" fill="rgba(200,168,75,0.03)" stroke="#c8a84b" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.3"/>
  <!-- unit box -->
  <rect x="162" y="116" width="76" height="64" rx="5" fill="#131824" stroke="#c8a84b" stroke-width="1.5"/>
  <rect x="170" y="124" width="60" height="48" rx="3" fill="#0e1219" stroke="#c8a84b" stroke-width="0.4" opacity="0.5"/>
  <!-- directional arrow -->
  <line x1="200" y1="116" x2="200" y2="94" stroke="#c8a84b" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <polygon points="200,88 196,96 204,96" fill="#c8a84b" opacity="0.6"/>
  <!-- 6 directional antennas fanning upward -->
  <line x1="180" y1="118" x2="130" y2="52" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="127" cy="49" r="4" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="190" y1="116" x2="162" y2="62" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="160" cy="58" r="4" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="200" y1="116" x2="200" y2="74" stroke="#c8a84b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="70" r="5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="210" y1="116" x2="238" y2="62" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="240" cy="58" r="4" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="220" y1="118" x2="270" y2="52" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="273" cy="49" r="4" fill="#c8a84b" filter="url(#gl)"/>
  <!-- UHF RX side -->
  <line x1="238" y1="148" x2="265" y2="148" stroke="#c8a84b" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <circle cx="268" cy="148" r="3" fill="#c8a84b" opacity="0.5"/>
  <!-- status LED -->
  <circle cx="180" cy="136" r="3" fill="#4fb06d"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <text x="189" y="137" font-family="Barlow Condensed,sans-serif" font-size="8" fill="#4fb06d" font-weight="700">ON</text>
  <!-- range label -->
  <text x="200" y="46" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="#c8a84b" opacity="0.7" letter-spacing="1">5 KM DIRECTIONAL RANGE</text>
  <!-- badge top-left -->
  <rect x="8" y="8" width="68" height="16" rx="2" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="0.5"/>
  <text x="42" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#c8a84b" letter-spacing="1">DIRECTIONAL</text>
  <!-- badge top-right -->
  <rect x="312" y="8" width="80" height="16" rx="2" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="0.5"/>
  <text x="352" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#c8a84b" letter-spacing="1">HORIZONTAL BEAM</text>
  <!-- labels -->
  <text x="200" y="248" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">UNIT TYPE 2</text>
  <text x="200" y="263" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#c8a84b" letter-spacing="1">25W DIRECTIONAL · 5 KM ANTI-DRONE RANGE</text>
  <text x="200" y="277" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">6-BAND 1.1–1.6 GHz · GPS · GLONASS · GALILEO · BEIDOU</text>
  <text x="200" y="291" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">12–28V DC · ~6 kg · WEATHER-RESISTANT</text>
</svg>