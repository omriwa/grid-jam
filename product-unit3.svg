<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="gl3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="pulse3" cx="50%" cy="49%" r="50%">
      <stop offset="0%" stop-color="#e07a5f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e07a5f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#090c10"/>
  <!-- high-power pulsing aura -->
  <circle cx="200" cy="148" r="145" fill="url(#pulse3)" opacity="0.7"><animate attributeName="r" values="130;150;130" dur="3s" repeatCount="indefinite"/></circle>
  <!-- large range rings -->
  <circle cx="200" cy="148" r="140" fill="none" stroke="#e07a5f" stroke-width="0.4" stroke-dasharray="6,10" opacity="0.12"/>
  <circle cx="200" cy="148" r="108" fill="none" stroke="#e07a5f" stroke-width="0.5" stroke-dasharray="5,8" opacity="0.18"/>
  <circle cx="200" cy="148" r="76"  fill="none" stroke="#e07a5f" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.28"/>
  <circle cx="200" cy="148" r="44"  fill="none" stroke="#c8a84b" stroke-width="1"   opacity="0.45"/>
  <circle cx="200" cy="148" r="22"  fill="rgba(224,122,95,0.1)" stroke="#e07a5f" stroke-width="1.5" opacity="0.7"/>
  <!-- unit body — larger/heavier than unit 1 -->
  <rect x="158" y="110" width="84" height="76" rx="6" fill="#131824" stroke="#e07a5f" stroke-width="2"/>
  <rect x="166" y="118" width="68" height="60" rx="3" fill="#0e1219" stroke="#e07a5f" stroke-width="0.5" opacity="0.4"/>
  <!-- power module indicator -->
  <rect x="170" y="128" width="30" height="12" rx="2" fill="rgba(224,122,95,0.15)" stroke="#e07a5f" stroke-width="0.8"/>
  <text x="185" y="137" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="7" fill="#e07a5f" font-weight="700">500W</text>
  <!-- 6 high-power omni antennas (thicker) -->
  <line x1="200" y1="110" x2="200" y2="64"  stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="60" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <line x1="237" y1="122" x2="272" y2="87"  stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="276" cy="83" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <line x1="238" y1="165" x2="272" y2="197" stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="275" cy="200" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <line x1="200" y1="186" x2="200" y2="232" stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="236" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <line x1="162" y1="165" x2="128" y2="197" stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="125" cy="200" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <line x1="163" y1="122" x2="128" y2="87"  stroke="#e07a5f" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="124" cy="83" r="5.5" fill="#e07a5f" filter="url(#gl3)"/>
  <!-- status LEDs -->
  <circle cx="214" cy="136" r="3" fill="#4fb06d"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="221" cy="136" r="3" fill="#e07a5f"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/></circle>
  <!-- 10x node badge -->
  <rect x="308" y="200" width="84" height="34" rx="3" fill="rgba(224,122,95,0.12)" stroke="#e07a5f" stroke-width="1"/>
  <text x="350" y="213" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="11" font-weight="800" fill="#e07a5f">10× FEWER</text>
  <text x="350" y="226" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="#e07a5f" opacity="0.7">NODES NEEDED</text>
  <!-- badges -->
  <rect x="8" y="8" width="58" height="16" rx="2" fill="rgba(224,122,95,0.12)" stroke="#e07a5f" stroke-width="0.5"/>
  <text x="37" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#e07a5f" letter-spacing="1">HIGH POWER</text>
  <rect x="316" y="8" width="76" height="16" rx="2" fill="rgba(79,176,109,0.1)" stroke="#4fb06d" stroke-width="0.5"/>
  <text x="354" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#4fb06d" letter-spacing="1">10 KM RADIUS</text>
  <!-- labels -->
  <text x="200" y="248" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">UNIT TYPE 3</text>
  <text x="200" y="263" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#e07a5f" letter-spacing="1">300–500W OMNI · 10 KM ANTI-DRONE RANGE</text>
  <text x="200" y="277" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">6-BAND 1.1–1.6 GHz · GPS · GLONASS · GALILEO · BEIDOU</text>
  <text x="200" y="291" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">28V DC · ~7 kg · WEATHER-RESISTANT · 10× NODE REDUCTION</text>
</svg>