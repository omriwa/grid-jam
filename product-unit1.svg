<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="#090c10"/>
  <!-- concentric rings -->
  <circle cx="200" cy="148" r="130" fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-dasharray="5,8" opacity="0.15"/>
  <circle cx="200" cy="148" r="95"  fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.22"/>
  <circle cx="200" cy="148" r="60"  fill="none" stroke="#c8a84b" stroke-width="1"   stroke-dasharray="3,5" opacity="0.32"/>
  <circle cx="200" cy="148" r="30"  fill="rgba(200,168,75,0.07)" stroke="#c8a84b" stroke-width="1" opacity="0.55"/>
  <!-- unit box -->
  <rect x="164" y="116" width="72" height="64" rx="5" fill="#131824" stroke="#c8a84b" stroke-width="1.5"/>
  <rect x="172" y="124" width="56" height="48" rx="3" fill="#0e1219" stroke="#c8a84b" stroke-width="0.4" opacity="0.5"/>
  <!-- grid lines on body -->
  <line x1="172" y1="140" x2="228" y2="140" stroke="#c8a84b" stroke-width="0.3" opacity="0.3"/>
  <line x1="172" y1="156" x2="228" y2="156" stroke="#c8a84b" stroke-width="0.3" opacity="0.3"/>
  <line x1="193" y1="124" x2="193" y2="172" stroke="#c8a84b" stroke-width="0.3" opacity="0.3"/>
  <line x1="207" y1="124" x2="207" y2="172" stroke="#c8a84b" stroke-width="0.3" opacity="0.3"/>
  <!-- 6 omni antennas -->
  <line x1="200" y1="116" x2="200" y2="77"  stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="74" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="232" y1="128" x2="262" y2="98"  stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="265" cy="95" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="234" y1="163" x2="264" y2="190" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="267" cy="193" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="200" y1="180" x2="200" y2="218" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="221" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="166" y1="163" x2="136" y2="190" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="133" cy="193" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <line x1="168" y1="128" x2="138" y2="98"  stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="135" cy="95" r="4.5" fill="#c8a84b" filter="url(#gl)"/>
  <!-- status LED -->
  <circle cx="184" cy="136" r="3" fill="#4fb06d"><animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <text x="193" y="137" font-family="Barlow Condensed,sans-serif" font-size="8" fill="#4fb06d" font-weight="700">ON</text>
  <!-- badge top-left -->
  <rect x="8" y="8" width="72" height="16" rx="2" fill="rgba(200,168,75,0.1)" stroke="#c8a84b" stroke-width="0.5"/>
  <text x="44" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#c8a84b" letter-spacing="1">OMNIDIRECTIONAL</text>
  <!-- badge top-right -->
  <rect x="320" y="8" width="72" height="16" rx="2" fill="rgba(79,176,109,0.1)" stroke="#4fb06d" stroke-width="0.5"/>
  <text x="356" y="19" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="700" fill="#4fb06d" letter-spacing="1">360° COVERAGE</text>
  <!-- labels -->
  <text x="200" y="248" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">UNIT TYPE 1</text>
  <text x="200" y="263" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#c8a84b" letter-spacing="1">25W OMNI · 2.5 KM ANTI-DRONE RANGE</text>
  <text x="200" y="277" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">6-BAND 1.1–1.6 GHz · GPS · GLONASS · GALILEO · BEIDOU</text>
  <text x="200" y="291" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#6a738a" letter-spacing="1">12–28V DC · ~5 kg · WEATHER-RESISTANT</text>
</svg>